openapi: 3.0.0
info:
  title: Mi Blog API
  version: 1.0.0
  description: API para gestionar usuarios y posts

servers:
  - url: http://localhost:4000
    description: Servidor local

paths:
  /users:
    get:
      summary: Obtener todos los usuarios
      tags: [Usuarios]
      responses:
        "200":
          description: Lista de usuarios
    post:
      summary: Crear un usuario
      tags: [Usuarios]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "200":
          description: Usuario creado

  /users/{id}:
    get:
      summary: Obtener usuario por ID
      tags: [Usuarios]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Usuario encontrado
        "404":
          description: Usuario no encontrado
    put:
      summary: Actualizar usuario
      tags: [Usuarios]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "200":
          description: Usuario actualizado
    delete:
      summary: Eliminar usuario
      tags: [Usuarios]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Usuario eliminado
        "404":
          description: Usuario no encontrado

  /users/posts:
    get:
      summary: Obtener todos los posts de todos los usuarios
      tags: [Posts]
      responses:
        "200":
          description: Lista de posts con datos del autor

  /users/{id}/posts:
    get:
      summary: Obtener posts de un usuario especifico
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Posts del usuario
        "404":
          description: Usuario no encontrado
    post:
      summary: Crear un post para un usuario
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post creado
        "400":
          description: Datos invalidos
        "404":
          description: Usuario no encontrado

  /users/{userId}/posts/{postId}:
    get:
      summary: Obtener posts de un usuario especifico
      tags: [Posts]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
        - in: path
          name: postId
          required: true
          schema:
            type: integer
        
      responses:
        "200":
          description: Posts del usuario
        "404":
          description: Usuario no encontrado
    put:
      summary: Actualizar un post para un usuario
      tags: [Posts]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
        - in: path
          name: postId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "200":
          description: Post actualizado
        "400":
          description: Datos invalidos
        "404":
          description: Usuario no encontrado

    delete:
      summary: Eliminar un post de un usuario
      tags: [Posts]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
        - in: path
          name: postId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post eliminado
        "404":
          description: Post o usuario no encontrado


components:
  schemas:
    UserInput:
      type: object
      required: [username, email, password_hash]
      properties:
        username:
          type: string
        email:
          type: string
        password_hash:
          type: string
    PostInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Este es el contenido del post
        published:
          type: boolean
          example: true