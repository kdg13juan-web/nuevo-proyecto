openapi: 3.0.0
info:
  title: Mi Blog API
  version: 1.0.0
  description: API para gestionar autores y posts

servers:
    - url: http://localhost:4000
      description: Servidor local
    - url: https://miniblogm2-production.up.railway.app
      description: Servidor en producción

paths:
  /authors:
    get:
      summary: Obtener todos los autores
      tags: [Autores]
      responses:
        "200":
          description: Lista de autores
    post:
      summary: Crear un autor
      tags: [Autores]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
      responses:
        "201":
          description: Autor creado

  /authors/{id}:
    get:
      summary: Obtener autor por ID
      tags: [Autores]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Autor encontrado
        "404":
          description: Autor no encontrado
    put:
      summary: Actualizar autor
      tags: [Autores]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
      responses:
        "200":
          description: Autor actualizado
        "404":
          description: Autor no encontrado
    delete:
      summary: Eliminar autor
      tags: [Autores]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Autor eliminado
        "404":
          description: Autor no encontrado

  /authors/posts:
    get:
      summary: Obtener todos los posts de todos los autores
      tags: [Posts]
      responses:
        "200":
          description: Lista de posts con datos del autor

  /authors/{id}/posts:
    get:
      summary: Obtener posts de un autor específico
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Posts del autor
        "404":
          description: Autor no encontrado
    post:
      summary: Crear un post para un autor
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post creado
        "400":
          description: Datos inválidos
        "404":
          description: Autor no encontrado

  /authors/{authorId}/posts/{postId}:
    get:
      summary: Obtener un post específico de un autor
      tags: [Posts]
      parameters:
        - in: path
          name: authorId
          required: true
          schema:
            type: integer
        - in: path
          name: postId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post encontrado
        "404":
          description: Post o autor no encontrado
    put:
      summary: Actualizar un post de un autor
      tags: [Posts]
      parameters:
        - in: path
          name: authorId
          required: true
          schema:
            type: integer
        - in: path
          name: postId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "200":
          description: Post actualizado
        "400":
          description: Datos inválidos
        "404":
          description: Post o autor no encontrado
    delete:
      summary: Eliminar un post de un autor
      tags: [Posts]
      parameters:
        - in: path
          name: authorId
          required: true
          schema:
            type: integer
        - in: path
          name: postId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post eliminado
        "404":
          description: Post o autor no encontrado

components:
  schemas:
    AuthorInput:
      type: object
      required: [username, email, password_hash]
      properties:
        username:
          type: string
          example: johndoe
        email:
          type: string
          example: john@example.com
        password_hash:
          type: string
          example: "123456"
    PostInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Este es el contenido del post
        published:
          type: boolean
          example: true
